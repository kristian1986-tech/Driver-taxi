<!DOCTYPE html><html lang="cs">  <head>    <meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<link rel="manifest" href="manifest.json">
  
  <title>Driver Panel</title>     
  <script src="https://cdn.tailwindcss.com">  </script>    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>      
  <body class="bg-gray-900 text-white min-h-screen p-6"><h1 class="text-2xl font-bold mb-6">Řidič panel</h1><!-- LOGIN DRIVER --><div id="loginSection" class="max-w-md space-y-4"><input id="driverCode"    
placeholder="Driver ID (např: driver1)"    
class="w-full p-3 rounded bg-gray-800 border border-gray-700">  <input id="driverPin"    
placeholder="PIN"    
type="password"    
class="w-full p-3 rounded bg-gray-800 border border-gray-700">  <button id="loginBtn"  
class="w-full bg-yellow-500 text-black font-bold py-3 rounded">
Přihlásit se
</button>

</div><!-- DRIVER PANEL -->    
  <div id="driverPanel" class="hidden">    
<div class="flex flex-col gap-4 mb-6">  <div class="flex gap-3">    
<input type="month"    
id="monthSelect"    
class="bg-gray-700 px-4 py-3 rounded text-white flex-1">  <button onclick="exportMonth()"    
class="bg-green-600 px-4 py-3 rounded font flex-1">  
Exportovat měsíc  
</button>  </div>  <div class="flex gap-3">    
<button onclick="showActive()"    
class="bg-yellow-500 text-black px-4 py-3 rounded flex-1">    
Aktivní jízdy    
</button>  <button onclick="showHistory()"    
class="bg-gray-600 px-4 py-3 rounded flex-1">  
Historie  
</button>  </div>  <button onclick="logoutDriver()"    
class="bg-red-500 px-4 py-3 rounded">  
Odhlásit  
</button>  </div>  <h2 id="historyTitle" class="text-xl font-bold mt-6 hidden">    
Historie jízd    
</h2>  <div id="ridesList" class="space-y-4 mt-6"></div>  <div id="historyList" class="space-y-4 mt-6 hidden"></div>   
  </div>  
    <script type="module"> 
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";  const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

function distanceKm(lat1, lon1, lat2, lon2){

const R = 6371;
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("/Driver-taxi/firebase-messaging-sw.js")
.then(function(registration){
console.log("Service Worker registered");
});

}

const loginSection = document.getElementById("loginSection");
const driverPanel = document.getElementById("driverPanel");
const ridesList = document.getElementById("ridesList");
const historyList = document.getElementById("historyList");
const historyTitle = document.getElementById("historyTitle");
let driverId = null;
let currentRideId = null;
let lastRideIds = [];
let driverLat = null;
let driverLng = null;

const rideSound = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
rideSound.loop = true;

    /* DRIVER LOGIN */
      

window.driverLogin = async function(){

const code = document.getElementById("driverCode").value.trim();
const pin = parseInt(document.getElementById("driverPin").value);

const driverRef = doc(db,"drivers",code);
const driverSnap = await getDoc(driverRef);

if(!driverSnap.exists()){
alert("Řidič nenalezen");
return;
}

const data = driverSnap.data();

if(data.pin !== pin){
alert("Špatný PIN");
return;
}

driverId = code;

localStorage.setItem("driverId",driverId);

await updateDoc(driverRef,{
status:"online"
});

loginSection.classList.add("hidden");
driverPanel.classList.remove("hidden");

startLocationTracking();
listenForRides();
requestNotificationPermission();

}

/* LOGOUT */

window.logoutDriver = async function(){

await updateDoc(doc(db,"drivers",driverId),{
status:"offline"
});

localStorage.removeItem("driverId");
location.reload();

}

async function requestNotificationPermission(){

if(!("Notification" in window)){
console.log("Browser nepodporuje notifikace");
return;
}

const permission = await Notification.requestPermission();

if(permission === "granted"){

try{

const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

const token = await getToken(messaging,{
vapidKey:"BNjO8QUOa0ncoJsS_XsEwYeWzwYzskAkbPGaMlDv4WOgvWXKQmsEMhKluwF_yPYxYkBKZqpDx05ERWQp2DI7-Ck",
serviceWorkerRegistration: registration
});

if(token){

await updateDoc(doc(db,"drivers",driverId),{
pushToken: token
});

console.log("Push token saved");

}

}catch(e){
console.log("Token error",e);
}

}

}

/* GPS TRACKING */

function startLocationTracking(){

if(!navigator.geolocation){
alert("GPS není dostupné");
return;
}

navigator.geolocation.watchPosition(async pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

driverLat = lat;
driverLng = lng;

await updateDoc(doc(db,"drivers",driverId),{
lat:lat,
lng:lng
});

if(currentRideId){

await updateDoc(doc(db,"rides",currentRideId),{
driverLat:lat,
driverLng:lng
});

}

},
error=>{
console.log("GPS error",error);
},
{
enableHighAccuracy:true
});

}

/* LISTEN RIDES */

function listenForRides(){

onSnapshot(collection(db,"rides"),snapshot=>{

let newRideIds = [];

ridesList.innerHTML="";
historyList.innerHTML="";

snapshot.forEach(docSnap=>{

const ride = {id:docSnap.id,...docSnap.data()};

if(
  ride.status === "new" &&
  (!ride.rejectedDrivers || !ride.rejectedDrivers.includes(driverId))
){
  newRideIds.push(ride.id);
}
  
if(ride.driverId === driverId){
currentRideId = ride.id;
}

if(
ride.status !== "new" &&
ride.driverId !== driverId
){
return;
}

if(
ride.rejectedDrivers &&
ride.rejectedDrivers.includes(driverId)
){

rideSound.pause();
rideSound.currentTime = 0;

return;
}

let distanceText = "";

if(ride.pickupLat != null && ride.pickupLng != null && driverLat != null && driverLng != null){

const km = distanceKm(
driverLat,
driverLng,
ride.pickupLat,
ride.pickupLng
);

distanceText =
"<p><strong>🚕 Od vás:</strong> "
+ km.toFixed(1) +
" km</p>";

}

const div = document.createElement("div");
div.className="bg-gray-700 p-4 rounded";

const rideDate = ride.createdAt
? new Date(ride.createdAt.seconds * 1000)
: null;

const datum = rideDate
? rideDate.toLocaleDateString("cs-CZ")
: "-";

const cas = rideDate
? rideDate.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"})
: "-";

div.innerHTML = `

<p class="ride-date" data-date="${rideDate ? rideDate.toISOString() : ""}">    
<strong>Datum:</strong> ${datum}    
</p>    
<p><strong>Čas:</strong> ${cas}</p>  <p><strong>Odkud:</strong> ${ride.pickup}</p>
${distanceText}
<p><strong>Kam:</strong> ${ride.destination}</p>  <p><strong>Vzdálenost:</strong> ${ride.distance ? ride.distance.toFixed(1)+" km" : "-"}</p>    
<p><strong>Cena:</strong> ${ride.estimatedPrice} Kč</p>  <p><strong>Telefon:</strong> ${ride.phone || "N/A"}</p>    
<p><strong>Status:</strong> ${ride.status}</p>    
`;  if(ride.phone){  
const callBtn=document.createElement("a");  
callBtn.href = `tel:${ride.phone}`;  
callBtn.innerText="Zavolat klientovi";  
callBtn.className="mt-2 block bg-gray-600 px-4 py-2 rounded text-center";  
div.appendChild(callBtn);  
}  if(ride.status==="new"){

const acceptBtn=document.createElement("button");
acceptBtn.innerText="Přijmout";
acceptBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";

acceptBtn.onclick=()=>{
  
rideSound.pause();
rideSound.currentTime = 0;
  
currentRideId = ride.id;

updateDoc(doc(db,"rides",ride.id),{
status:"confirmed",
driverId:driverId
});

const pickup = encodeURIComponent(ride.pickup);

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${pickup}&travelmode=driving`,
"_blank"
);
};

div.appendChild(acceptBtn);


const rejectBtn=document.createElement("button");
rejectBtn.innerText="Zrušit";
rejectBtn.className="mt-2 bg-red-500 px-4 py-2 rounded";

rejectBtn.onclick=()=>{

rideSound.pause();
rideSound.currentTime = 0;

updateDoc(doc(db,"rides",ride.id),{
rejectedDrivers: arrayUnion(driverId)
});

};

div.appendChild(rejectBtn);
}
if(ride.status==="confirmed" && ride.driverId===driverId){

const arriveBtn=document.createElement("button");
arriveBtn.innerText="Jsem na místě";
arriveBtn.className="mt-3 bg-yellow-500 px-4 py-2 rounded";

arriveBtn.onclick=()=>{
updateDoc(doc(db,"rides",ride.id),{
status:"arrived"
});
};

div.appendChild(arriveBtn);
}

if(ride.status==="arrived" && ride.driverId===driverId){

const startBtn=document.createElement("button");
startBtn.innerText="Start jízdy";
startBtn.className="mt-3 bg-blue-500 px-4 py-2 rounded";

startBtn.onclick=()=>{

updateDoc(doc(db,"rides",ride.id),{
status:"in_progress"
});

const destination = encodeURIComponent(ride.destination);

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=driving`,
"_blank"
);

};

div.appendChild(startBtn);
}

if(ride.status==="in_progress" && ride.driverId===driverId){

const finishBtn=document.createElement("button");
finishBtn.innerText="Dokončit jízdu";
finishBtn.className="mt-3 bg-red-600 px-4 py-2 rounded";

finishBtn.onclick=()=>{
updateDoc(doc(db,"rides",ride.id),{
status:"completed"
});
};

div.appendChild(finishBtn);
}

const statusDiv = document.createElement("div");
statusDiv.className = "text-sm text-gray-300 mt-2";
statusDiv.innerText = "Status jízdy: " + ride.status;

div.appendChild(statusDiv);
if(ride.status==="completed"){

const receiptBtn=document.createElement("button");

receiptBtn.innerText="Stáhnout účtenku";
receiptBtn.className="mt-3 bg-green-600 px-4 py-2 rounded w-full";

receiptBtn.onclick = ()=>{

const { jsPDF } = window.jspdf;

const pdf = new jsPDF();

/* DATA */
const rideDate = ride.createdAt
? new Date(ride.createdAt.seconds * 1000)
: new Date();

const datum = rideDate.toLocaleDateString("cs-CZ");
const cas = rideDate.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"});

/* HEADER */

pdf.setFontSize(20);
pdf.setFont("helvetica","bold");
pdf.text("TAXI PLZEN",105,20,{align:"center"});

pdf.setFontSize(10);
pdf.setFont("helvetica","normal");

pdf.text("Taxi sluzba Plzen",105,28,{align:"center"});
pdf.text("Telefon: +420 777 842 870",105,34,{align:"center"});
pdf.text("Email: info@taxiplzen.cz",105,40,{align:"center"});

pdf.line(20,45,190,45);

/* TITLE */

pdf.setFontSize(14);
pdf.setFont("helvetica","bold");
const year = new Date().getFullYear();

const receiptNumber =
year + "-" +
ride.id.slice(-6).toUpperCase();

pdf.text("UCTENKA #"+receiptNumber,105,55,{align:"center"});

pdf.setFont("helvetica","normal");
pdf.setFontSize(11);

/* DATA */

pdf.text("Datum: "+datum,20,75);
pdf.text("Cas: "+cas,20,85);

pdf.line(20,95,190,95);

/* RIDE INFO */

pdf.text("Odkud: "+ride.pickup,20,110);
pdf.text("Kam: "+ride.destination,20,120);

pdf.text("Telefon: "+(ride.phone || "-"),20,135);

pdf.text("Vzdalenost: "+(ride.distance ? ride.distance.toFixed(1)+" km" : "-"),20,150);

pdf.line(20,160,190,160);

/* TOTAL */

pdf.setFont("helvetica","bold");
pdf.setFontSize(14);

pdf.text("Celkem:",20,180);
pdf.text((ride.estimatedPrice || 0)+" Kc",150,180);

pdf.line(20,190,190,190);

/* FOOTER */

pdf.setFontSize(9);
pdf.setFont("helvetica","normal");

pdf.text("Dekujeme za využití naše služby.",105,205,{align:"center"});

pdf.save("uctenka_taxi.pdf");

};

div.appendChild(receiptBtn);

}

if(
ride.status==="completed" ||
ride.status==="cancelled" ||
ride.status==="rejected"
){
div.className="bg-gray-800 p-4 rounded opacity-70";
historyList.appendChild(div);
}else{
ridesList.appendChild(div);
}

});
  
if(newRideIds.length > 0){

if(rideSound.paused){
rideSound.play().catch(()=>{});

if(navigator.vibrate){
navigator.vibrate([400,200,400,200,400]);
}

if(Notification.permission === "granted"){
new Notification("🚕 Nová jízda!",{
body:"Máte novou objednávku taxi.",
icon:"https://maps.google.com/mapfiles/kml/shapes/cabs.png"
});
}

}

}else{

rideSound.pause();
rideSound.currentTime = 0;

}

lastRideIds = newRideIds;
  
});

}

/* AUTO LOGIN */

const savedDriver = localStorage.getItem("driverId");

if(savedDriver){

driverId = savedDriver;

loginSection.classList.add("hidden");
driverPanel.classList.remove("hidden");

historyList.classList.add("hidden");
historyTitle.classList.add("hidden");

startLocationTracking();
listenForRides();

}

window.showActive = function(){

ridesList.classList.remove("hidden");
historyList.classList.add("hidden");
historyTitle.classList.add("hidden");

}

window.showHistory = function(){

ridesList.classList.add("hidden");
historyList.classList.remove("hidden");
historyTitle.classList.remove("hidden");

}

window.exportMonth = function(){

const value = document.getElementById("monthSelect").value;

if(!value){
alert("Vyber měsíc");
return;
}

const selectedMonth = parseInt(value.split("-")[1]) - 1;

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

pdf.setFontSize(18);
pdf.text("Taxi Plzen",105,20,{align:"center"});

pdf.setFontSize(14);
pdf.text("Prehled jízd",105,30,{align:"center"});

let y = 50;

pdf.setFontSize(10);

pdf.text("Datum",20,y);
pdf.text("Odkud",50,y);
pdf.text("Kam",110,y);
pdf.text("Cena",180,y,{align:"right"});

y += 5;

pdf.line(20,y,190,y);

y += 10;

let total = 0;

historyList.querySelectorAll("div").forEach(div=>{

const dateText = div.querySelector(".ride-date");

if(!dateText) return;

const rideDate = new Date(dateText.dataset.date);
const rideMonth = rideDate.getMonth();

if(rideMonth !== selectedMonth) return;

const datum = rideDate.toLocaleDateString("cs-CZ");

const pTags = div.querySelectorAll("p");

let from="", to="", price=0;

pTags.forEach(p=>{
const t = p.innerText;

if(t.includes("Odkud")) from = t.replace("Odkud: ","");
if(t.includes("Kam")) to = t.replace("Kam: ","");
if(t.includes("Cena")){
price = parseFloat(t.replace("Cena:","").replace("Kč","").trim());
}
});

total += price;

function normalize(text){
return text
.replace(/č/g,"c")
.replace(/ř/g,"r")
.replace(/š/g,"s")
.replace(/ž/g,"z")
.replace(/ě/g,"e")
.replace(/á/g,"a")
.replace(/í/g,"i")
.replace(/ý/g,"y")
.replace(/ů/g,"u")
.replace(/ď/g,"d")
.replace(/ť/g,"t")
.replace(/ň/g,"n");
}

pdf.text(normalize(datum),20,y);
pdf.text(normalize(from.substring(0,20)),50,y);
pdf.text(normalize(to.substring(0,20)),110,y);
pdf.text(price+" Kc ",180,y,{align:"right"});

y += 10;

if(y > 270){
pdf.addPage();
y = 20;
}

});

pdf.line(20,y,190,y);

y += 10;

pdf.setFontSize(12);
pdf.setFont("helvetica","bold");

pdf.text("CELKEM:",140,y);
pdf.text(total+" Kc ",180,y,{align:"right"});

pdf.save("prehled_jizd_mesic.pdf");

};

window.addEventListener("DOMContentLoaded", () => {
document.getElementById("loginBtn").addEventListener("click", window.driverLogin);
});

</script>  
</body> 
</html>
